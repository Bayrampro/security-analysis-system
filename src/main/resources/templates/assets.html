<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Объекты защиты | Security Analysis System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: mainNav('assets')}"></div>

<main class="container pb-5">
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card p-3">
                <h2 class="h6 mb-3" th:text="${editMode} ? 'Редактирование объекта' : 'Новый объект защиты'"></h2>
                <form th:action="${editMode} ? @{/assets/{id}(id=${assetForm.id})} : @{/assets}"
                      th:object="${assetForm}" method="post" novalidate>
                    <div class="mb-3">
                        <label class="form-label" for="name">Название</label>
                        <input class="form-control" id="name" th:field="*{name}">
                        <div class="text-danger small" th:errors="*{name}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="description">Описание</label>
                        <textarea class="form-control" id="description" rows="4" th:field="*{description}"></textarea>
                        <div class="text-danger small" th:errors="*{description}"></div>
                    </div>
                    <button class="btn btn-primary" type="submit" th:text="${editMode} ? 'Сохранить' : 'Создать'"></button>
                    <a class="btn btn-link" th:if="${editMode}" th:href="@{/assets}">Отмена</a>
                </form>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card p-3">
                <h2 class="h6 mb-3">Список объектов</h2>
                <div class="table-responsive">
                    <table class="table table-striped align-middle">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Название</th>
                            <th>Описание</th>
                            <th>Угроз</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="asset : ${assets}">
                            <td th:text="${asset.id}"></td>
                            <td th:text="${asset.name}"></td>
                            <td th:text="${asset.description}"></td>
                            <td th:text="${#lists.size(asset.threats)}"></td>
                            <td class="text-end">
                                <a class="btn btn-sm btn-outline-primary me-1"
                                   th:href="@{/assets/{id}/edit(id=${asset.id})}">Редактировать</a>
                                <form th:action="@{/assets/{id}/delete(id=${asset.id})}" method="post" class="d-inline">
                                    <button class="btn btn-sm btn-outline-danger" type="submit">Удалить</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(assets)}">
                            <td colspan="5" class="text-center text-muted">Пока нет объектов защиты</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<!-- Страница входа в систему: форма логина и сообщения о статусе авторизации. -->
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход | Security Analysis System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="card p-4">
                <h1 class="h4 mb-3">Вход в систему</h1>
                <p class="text-muted">Анализ защищенности информации ограниченного доступа</p>

                <div class="alert alert-danger" th:if="${param.error}">Неверный логин или пароль</div>
                <div class="alert alert-success" th:if="${param.logout}">Вы успешно вышли из системы</div>
                <div class="alert alert-success" th:if="${param.registered}">Регистрация выполнена, войдите в систему</div>

                <form th:action="@{/login}" method="post" class="mt-3">
                    <div class="mb-3">
                        <label class="form-label" for="username">Логин</label>
                        <input class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label" for="password">Пароль</label>
                        <input class="form-control" id="password" name="password" type="password" required>
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Войти</button>
                </form>

                <a class="btn btn-link mt-3 px-0" th:href="@{/register}">Нет аккаунта? Зарегистрироваться</a>

                <div class="small text-muted mt-3">
                    Тестовые аккаунты: <code>admin/admin123</code>, <code>analyst/analyst123</code>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<!-- Страница регистрации пользователя: форма создания учетной записи и валидация. -->
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Регистрация | Security Analysis System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="card p-4">
                <h1 class="h4 mb-3">Регистрация пользователя</h1>

                <div class="alert alert-danger" th:if="${registerError}" th:text="${registerError}"></div>

                <form th:action="@{/register}" th:object="${userForm}" method="post" novalidate>
                    <div class="mb-3">
                        <label class="form-label" for="username">Логин</label>
                        <input class="form-control" id="username" th:field="*{username}">
                        <div class="text-danger small" th:errors="*{username}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="password">Пароль</label>
                        <input class="form-control" id="password" type="password" th:field="*{password}">
                        <div class="text-danger small" th:errors="*{password}"></div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label" for="role">Роль</label>
                        <select class="form-select" id="role" th:field="*{role}">
                            <option th:each="role : ${roles}" th:value="${role}" th:text="${role}"></option>
                        </select>
                        <div class="text-danger small" th:errors="*{role}"></div>
                    </div>
                    <button class="btn btn-primary" type="submit">Создать аккаунт</button>
                    <a class="btn btn-link" th:href="@{/login}">Назад к входу</a>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>

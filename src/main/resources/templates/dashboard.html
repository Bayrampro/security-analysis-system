<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard | Security Analysis System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: mainNav('dashboard')}"></div>

<main class="container pb-5">
    <div class="row g-3 mb-4">
        <div class="col-md-6">
            <div class="card p-3 metric-card">
                <p>Количество объектов защиты</p>
                <h2 th:text="${metrics.assetCount}">0</h2>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card p-3 metric-card">
                <p>Количество угроз</p>
                <h2 th:text="${metrics.threatCount}">0</h2>
            </div>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-lg-6">
            <div class="card p-3">
                <h2 class="h6 mb-3">Распределение угроз по объектам</h2>
                <canvas id="assetsChart"></canvas>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card p-3">
                <h2 class="h6 mb-3">Уровни риска</h2>
                <canvas id="riskChart"></canvas>
            </div>
        </div>
        <div class="col-12">
            <div class="card p-3">
                <h2 class="h6 mb-3">Динамика угроз</h2>
                <canvas id="dynamicsChart"></canvas>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script th:inline="javascript">
    const riskLabels = /*[[${metrics.riskLevels.keySet()}]]*/ [];
    const riskValues = /*[[${metrics.riskLevels.values()}]]*/ [];
    const assetLabels = /*[[${metrics.threatsByAsset.keySet()}]]*/ [];
    const assetValues = /*[[${metrics.threatsByAsset.values()}]]*/ [];
    const dynamicsLabels = /*[[${metrics.threatDynamics.keySet()}]]*/ [];
    const dynamicsValues = /*[[${metrics.threatDynamics.values()}]]*/ [];

    new Chart(document.getElementById('assetsChart'), {
        type: 'bar',
        data: {
            labels: assetLabels,
            datasets: [{
                label: 'Количество угроз',
                data: assetValues,
                backgroundColor: '#3b82f6'
            }]
        }
    });

    new Chart(document.getElementById('riskChart'), {
        type: 'doughnut',
        data: {
            labels: riskLabels,
            datasets: [{
                data: riskValues,
                backgroundColor: ['#10b981', '#f59e0b', '#ef4444']
            }]
        }
    });

    new Chart(document.getElementById('dynamicsChart'), {
        type: 'line',
        data: {
            labels: dynamicsLabels,
            datasets: [{
                label: 'Новые угрозы',
                data: dynamicsValues,
                borderColor: '#1d4ed8',
                backgroundColor: 'rgba(29, 78, 216, 0.15)',
                fill: true,
                tension: 0.3
            }]
        },
        options: {
            scales: {
                y: { beginAtZero: true, ticks: { precision: 0 } }
            }
        }
    });
</script>
</body>
</html>

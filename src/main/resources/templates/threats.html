<!DOCTYPE html>
<!-- Страница угроз: форма управления угрозами и таблица с расчетом рисков. -->
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Угрозы | Security Analysis System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: mainNav('threats')}"></div>

<main class="container pb-5">
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card p-3">
                <h2 class="h6 mb-3" th:text="${editMode} ? 'Редактирование угрозы' : 'Новая угроза'"></h2>
                <form th:action="${editMode} ? @{/threats/{id}(id=${threatForm.id})} : @{/threats}"
                      th:object="${threatForm}" method="post" novalidate>
                    <div class="mb-3">
                        <label class="form-label" for="name">Название</label>
                        <input class="form-control" id="name" th:field="*{name}">
                        <div class="text-danger small" th:errors="*{name}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="description">Описание</label>
                        <textarea class="form-control" id="description" rows="3" th:field="*{description}"></textarea>
                        <div class="text-danger small" th:errors="*{description}"></div>
                    </div>
                    <div class="row g-2">
                        <div class="col-6">
                            <label class="form-label" for="probability">Вероятность (0-1)</label>
                            <input class="form-control" id="probability" th:field="*{probability}" type="number" step="0.01" min="0" max="1">
                            <div class="text-danger small" th:errors="*{probability}"></div>
                        </div>
                        <div class="col-6">
                            <label class="form-label" for="impact">Ущерб (0-10)</label>
                            <input class="form-control" id="impact" th:field="*{impact}" type="number" step="0.1" min="0" max="10">
                            <div class="text-danger small" th:errors="*{impact}"></div>
                        </div>
                    </div>
                    <div class="mt-3 mb-3">
                        <label class="form-label" for="assetId">Объект защиты</label>
                        <select class="form-select" id="assetId" th:field="*{assetId}">
                            <option value="">Выберите объект</option>
                            <option th:each="asset : ${assets}" th:value="${asset.id}" th:text="${asset.name}"></option>
                        </select>
                        <div class="text-danger small" th:errors="*{assetId}"></div>
                    </div>
                    <button class="btn btn-primary" type="submit" th:text="${editMode} ? 'Сохранить' : 'Создать'"></button>
                    <a class="btn btn-link" th:if="${editMode}" th:href="@{/threats}">Отмена</a>
                </form>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card p-3">
                <h2 class="h6 mb-3">Реестр угроз</h2>
                <div class="table-responsive">
                    <table class="table table-striped align-middle">
                        <thead>
                        <tr>
                            <th>Название</th>
                            <th>Объект</th>
                            <th>Риск</th>
                            <th>Уровень</th>
                            <th>Дата</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="threat : ${threats}">
                            <td>
                                <div class="fw-semibold" th:text="${threat.name}"></div>
                                <div class="small text-muted" th:text="${threat.description}"></div>
                            </td>
                            <td th:text="${threat.assetName}"></td>
                            <td th:text="${#numbers.formatDecimal(threat.riskScore, 1, 2)}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${threat.riskLevel.name() == 'LOW'} ? ' badge-low' : (${threat.riskLevel.name() == 'MEDIUM'} ? ' badge-medium' : ' badge-high')"
                                      th:text="${threat.riskLevel}"></span>
                            </td>
                            <td th:text="${#temporals.format(threat.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                            <td class="text-end">
                                <a class="btn btn-sm btn-outline-primary me-1"
                                   th:href="@{/threats/{id}/edit(id=${threat.id})}">Редактировать</a>
                                <form th:action="@{/threats/{id}/delete(id=${threat.id})}" method="post" class="d-inline">
                                    <button class="btn btn-sm btn-outline-danger" type="submit">Удалить</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(threats)}">
                            <td colspan="6" class="text-center text-muted">Пока нет угроз</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

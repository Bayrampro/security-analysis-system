<!DOCTYPE html>
<!-- Страница отчетов: фильтр по датам, сводка уровней риска и табличный отчет. -->
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Отчеты | Security Analysis System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: mainNav('reports')}"></div>

<main class="container pb-5">
    <div class="card p-3 mb-4">
        <h2 class="h6 mb-3">Фильтр отчета</h2>
        <form method="get" th:action="@{/reports}" th:object="${filter}" class="row g-3">
            <div class="col-md-4">
                <label class="form-label" for="fromDate">С даты</label>
                <input id="fromDate" class="form-control" type="date" th:field="*{fromDate}">
            </div>
            <div class="col-md-4">
                <label class="form-label" for="toDate">По дату</label>
                <input id="toDate" class="form-control" type="date" th:field="*{toDate}">
            </div>
            <div class="col-md-4 d-flex align-items-end gap-2">
                <button class="btn btn-primary" type="submit">Применить</button>
                <a class="btn btn-outline-secondary" th:href="@{/reports}">Сброс</a>
            </div>
        </form>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card p-3 metric-card">
                <p>LOW</p>
                <h2 th:text="${summary['LOW']}">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3 metric-card">
                <p>MEDIUM</p>
                <h2 th:text="${summary['MEDIUM']}">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3 metric-card">
                <p>HIGH</p>
                <h2 th:text="${summary['HIGH']}">0</h2>
            </div>
        </div>
    </div>

    <div class="card p-3">
        <h2 class="h6 mb-3">Отчет по угрозам</h2>
        <div class="table-responsive">
            <table class="table table-striped align-middle">
                <thead>
                <tr>
                    <th>Дата</th>
                    <th>Угроза</th>
                    <th>Объект</th>
                    <th>Риск</th>
                    <th>Уровень</th>
                    <th>Рекомендация</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="row : ${rows}">
                    <td th:text="${#temporals.format(row.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                    <td th:text="${row.name}"></td>
                    <td th:text="${row.assetName}"></td>
                    <td th:text="${#numbers.formatDecimal(row.riskScore, 1, 2)}"></td>
                    <td th:text="${row.riskLevel}"></td>
                    <td th:text="${row.recommendation}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(rows)}">
                    <td colspan="6" class="text-center text-muted">Нет данных для выбранного периода</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
